<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Фундамент 🏠</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="fund.css" />
  </head>
  <body>
    <div class="container">
      <div class="fund-header">
        <a href="../index.html" class="fund-back">← Назад</a>
        <h1 class="fund-title"><span>Фундамент</span> 🏠</h1>
        <button id="themeToggle" class="theme-btn" aria-label="Змінити тему">☀️</button>
      </div>

      <div id="status" class="status-bar">Підключення...</div>

      <!-- DASHBOARD -->
      <div class="card fund-progress-card">
        <div class="fund-goal-label">🎯 Ціль</div>
        <div class="fund-goal-value" id="fundGoalDisplay">$200,000</div>

        <div class="fund-bar-bg">
          <div class="fund-bar-fill" id="fundBarFill" style="width: 0%"></div>
        </div>
        <div class="fund-percent" id="fundPercent">0.00%</div>

        <div class="fund-currencies">
          <div class="fund-cur-card">
            <div class="fund-cur-icon">🥇</div>
            <div class="fund-cur-label">Золото</div>
            <div class="fund-cur-value" id="fundGold">0 <span>г</span></div>
          </div>
          <div class="fund-cur-card">
            <div class="fund-cur-icon">💵</div>
            <div class="fund-cur-label">Долар</div>
            <div class="fund-cur-value" id="fundUSD">$0</div>
          </div>
          <div class="fund-cur-card">
            <div class="fund-cur-icon">💰</div>
            <div class="fund-cur-label">Гривня</div>
            <div class="fund-cur-value" id="fundUAH">0 <span>₴</span></div>
          </div>
        </div>

        <div class="fund-remaining" id="fundRemaining">Залишилось: <b>$200,000</b></div>

        <div class="fund-rates" id="fundRates">Курси завантажуються...</div>
      </div>

      <!-- ADMIN PANEL -->
      <div class="card fund-admin" id="fundAdmin">
        <div class="section-title" style="margin-bottom:0">💸 Додати внесок</div>

        <div class="fund-input-row">
          <div>
            <label>Сума (₴)</label>
            <input type="number" id="fundAmount" placeholder="15000" min="0" step="0.01" />
          </div>
          <div>
            <label>Дата</label>
            <input type="date" id="fundDate" />
          </div>
        </div>

        <label>Нотатка (необов'язково)</label>
        <input type="text" id="fundNote" placeholder="Напр.: Зарплата" />

        <button id="fundSaveBtn" class="primary-btn fund-save-btn">Зберегти внесок</button>
      </div>

      <!-- LOGIN HINT -->
      <div id="fundLoginHint" class="fund-login-hint" style="display:none">
        🔐 Увійдіть як адмін у <a href="../index.html">Кімнаті Рекордів</a>, щоб додавати внески
      </div>

      <!-- HISTORY -->
      <div class="section-title">📅 Історія внесків</div>
      <div id="fundTimeline"></div>
      <div id="fundEmpty" class="empty-state" style="display:none">Ще немає внесків. Час покласти перший камінь!</div>
    </div>

    <script type="module" src="fund.js"></script>
  </body>
</html>
