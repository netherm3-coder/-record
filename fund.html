<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Фундамент 🏠</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* === FUND-SPECIFIC STYLES === */
      .fund-back {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 8px 14px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 800;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: var(--transition);
        justify-self: start;
      }
      .fund-back:hover { border-color: var(--accent); color: var(--text-main); }

      .fund-header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding: 10px;
      }
      .fund-title {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--text-main);
        margin: 0;
        text-align: center;
        white-space: nowrap;
      }
      .fund-title span { color: var(--highlight); }

      /* Progress */
      .fund-progress-card {
        text-align: center;
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(16, 185, 129, 0.05));
        border: 1px solid rgba(245, 158, 11, 0.3);
        padding: 25px;
        position: relative;
        overflow: hidden;
      }
      .fund-goal-label {
        font-size: 0.85rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .fund-goal-value {
        font-size: 2rem;
        font-weight: 800;
        color: var(--highlight);
        text-shadow: 0 2px 10px rgba(245, 158, 11, 0.3);
        margin-bottom: 15px;
      }
      .fund-bar-bg {
        width: 100%;
        height: 14px;
        background: var(--input-bg);
        border-radius: 7px;
        overflow: hidden;
        border: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .fund-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--highlight), var(--success));
        border-radius: 7px;
        transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }
      .fund-bar-fill::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        animation: shimmer 2s infinite;
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .fund-percent {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--success);
        margin-bottom: 20px;
      }

      /* Currency cards */
      .fund-currencies {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 15px;
      }
      .fund-cur-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 8px;
        text-align: center;
        transition: var(--transition);
      }
      .fund-cur-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .fund-cur-icon { font-size: 1.3rem; margin-bottom: 4px; }
      .fund-cur-label {
        font-size: 0.65rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .fund-cur-value {
        font-size: 1rem;
        font-weight: 800;
        color: var(--text-main);
        word-break: break-all;
      }
      .fund-cur-value span { font-size: 0.7rem; color: var(--text-muted); }

      .fund-remaining {
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .fund-remaining b { color: var(--danger); }

      .fund-rates {
        font-size: 0.75rem;
        color: var(--text-muted);
        padding: 8px 12px;
        background: rgba(0,0,0,0.15);
        border-radius: 10px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      .fund-rates b { color: var(--accent); }

      /* Admin panel */
      .fund-admin { display: none; }
      .fund-admin.visible { display: block; }

      .fund-input-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* History */
      .fund-history-item {
        position: relative;
        margin-bottom: 15px;
        background: var(--card-bg);
        padding: 15px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        transition: var(--transition);
        margin-left: 20px;
      }
      .fund-history-item:hover { transform: translateX(5px); border-color: var(--highlight); }
      .fund-deposit-amount {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--highlight);
      }
      .fund-deposit-meta {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .fund-deposit-note {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-style: italic;
        margin-top: 6px;
        padding: 6px 10px;
        background: rgba(0,0,0,0.1);
        border-left: 2px solid var(--highlight);
        border-radius: 0 6px 6px 0;
      }

      .fund-login-hint {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        padding: 20px;
      }

      @media (max-width: 360px) {
        .fund-currencies { grid-template-columns: 1fr; }
        .fund-goal-value { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="fund-header">
        <a href="index.html" class="fund-back">← Назад</a>
        <h1 class="fund-title"><span>Фундамент</span> 🏠</h1>
        <button id="themeToggle" class="theme-btn" style="justify-self:end" aria-label="Змінити тему">☀️</button>
      </div>

      <div id="status" class="status-bar">Підключення...</div>

      <!-- DASHBOARD -->
      <div class="card fund-progress-card">
        <div class="fund-goal-label">🎯 Ціль</div>
        <div class="fund-goal-value" id="fundGoalDisplay">$200,000</div>

        <div class="fund-bar-bg">
          <div class="fund-bar-fill" id="fundBarFill" style="width: 0%"></div>
        </div>
        <div class="fund-percent" id="fundPercent">0.00%</div>

        <div class="fund-currencies">
          <div class="fund-cur-card">
            <div class="fund-cur-icon">🥇</div>
            <div class="fund-cur-label">Золото</div>
            <div class="fund-cur-value" id="fundGold">0 <span>г</span></div>
          </div>
          <div class="fund-cur-card">
            <div class="fund-cur-icon">💵</div>
            <div class="fund-cur-label">Долар</div>
            <div class="fund-cur-value" id="fundUSD">$0</div>
          </div>
          <div class="fund-cur-card">
            <div class="fund-cur-icon">💰</div>
            <div class="fund-cur-label">Гривня</div>
            <div class="fund-cur-value" id="fundUAH">0 <span>₴</span></div>
          </div>
        </div>

        <div class="fund-remaining" id="fundRemaining">Залишилось: <b>$200,000</b></div>

        <div class="fund-rates" id="fundRates">
          Курси завантажуються...
        </div>
      </div>

      <!-- ADMIN PANEL -->
      <div class="card fund-admin" id="fundAdmin">
        <div class="section-title" style="margin-bottom:0">💸 Додати внесок</div>

        <div class="fund-input-row">
          <div>
            <label>Сума (₴)</label>
            <input type="number" id="fundAmount" placeholder="15000" min="0" step="0.01" />
          </div>
          <div>
            <label>Дата</label>
            <input type="date" id="fundDate" />
          </div>
        </div>

        <label>Нотатка (необов'язково)</label>
        <input type="text" id="fundNote" placeholder="Напр.: Зарплата" />

        <button id="fundSaveBtn" class="primary-btn" style="background: linear-gradient(135deg, var(--highlight), #d97706);">
          Зберегти внесок
        </button>
      </div>

      <!-- LOGIN HINT -->
      <div id="fundLoginHint" class="fund-login-hint" style="display:none">
        🔐 Увійдіть як адмін у <a href="index.html" style="color:var(--accent)">Кімнаті Рекордів</a>, щоб додавати внески
      </div>

      <!-- HISTORY -->
      <div class="section-title">📅 Історія внесків</div>
      <div id="fundTimeline"></div>
      <div id="fundEmpty" class="empty-state" style="display:none">Ще немає внесків. Час покласти перший камінь!</div>
    </div>

    <script type="module" src="fund.js"></script>
  </body>
</html>
